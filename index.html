<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
   <title>FLAMINGALLERY 🦩🎨</title>
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23DD382C'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23F5F2EB' font-family='sans-serif' font-weight='bold'>F</text></svg>">
   <link rel="stylesheet" href="./shared/brand.css">
   <link rel="stylesheet" href="style.css">
   <script type="importmap">{"imports":{"three":"./shared/vendor/three.module.js"}}</script>
</head>
<body>

   <!-- 3D 캔버스 마운트 -->
   <div id="app"></div>

   <!-- 상단 HUD -->
   <header class="hud hud-top" aria-hidden="true">
     <span class="hud-wordmark">FLAMINGALLERY</span>
     <span class="hud-right" id="hudMeta"></span>
   </header>

   <!-- 조작 힌트 -->
   <div class="hud hud-hint" id="hint" aria-hidden="true"></div>

   <!-- 모바일 이동 스틱 -->
   <div id="stick" aria-hidden="true"><div id="stickThumb"></div></div>

   <!-- 뉴스 상세 패널 -->
   <aside id="panel" role="dialog" aria-modal="false" aria-hidden="true">
     <div class="panel-head">
       <span class="panel-kicker" id="panelKicker">MASTERPIECE</span>
       <button id="panelClose" type="button" aria-label="닫기">닫기 ✕</button>
     </div>
     <h2 id="panelTitle"></h2>
     <div class="panel-meta" id="panelMeta"></div>
     <div class="panel-body" id="panelBody"></div>
     <div class="panel-foot">
       <a id="panelLink" href="#" target="_blank" rel="noopener noreferrer">자세히 보기 ↗</a>
       <span class="panel-brand">FLAMINGALLERY</span>
     </div>
   </aside>

   <!-- 로딩 오버레이 -->
   <div id="loader">
     <div class="loader-word">FLAMINGALLERY</div>
     <div class="spin" aria-hidden="true"></div>
     <p class="loader-kr">플라밍 명화를 미술관에 거는 중</p>
     <p class="loader-en">HANGING FLAMING MASTERPIECES</p>
   </div>

   <!-- WebGL / 데이터 폴백 -->
   <div id="fallback" hidden>
     <div class="fallback-word">FLAMINGALLERY</div>
     <h1 id="fallbackTitle">이 브라우저에선 전시장이 열리지 않아요</h1>
     <p id="fallbackDesc">WebGL을 지원하는 최신 브라우저(Chrome · Safari · Edge)로 다시 들어와 주세요</p>
   </div>

   <script type="module" src="main.js"></script>
</body>
</html>
